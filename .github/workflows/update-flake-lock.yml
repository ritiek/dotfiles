name: update-flake-lock
on:
  workflow_dispatch:
  schedule:
    # - cron: '30 8 * * *' # runs daily at 08:30 UTC, which is 2:00 PM IST
    - cron: '30 22 * * *' # runs daily at 04:00 AM IST

jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    outputs:
      pull-request-number: ${{ steps.update.outputs.pull-request-number }}
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Update flake.lock
        id: update
        uses: DeterminateSystems/update-flake-lock@main
        with:
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated
          token: ${{ secrets.GH_TOKEN_FOR_DOTS }}

  notify-failure:
    needs: [lockfile]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Matrix
        run: |
          PR_URL=""
          if [ -n "${{ needs.lockfile.outputs.pull-request-number }}" ]; then
            PR_URL="\nPR: https://github.com/${{ github.repository }}/pull/${{ needs.lockfile.outputs.pull-request-number }}"
          fi
          curl -sf \
            "https://webhook.clawsiecats.lol/matrix/github-actions/new/${{ github.run_id }}" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_MATRIX_AUTH }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"m.text\",\"body\":\"flake.lock update failed\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}${PR_URL}\"}"
