    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
      # Filesystem on /mnt for some reason has more space on GitHub action
      # runner than /
      - name: Bind mount /nix
        run: |
          sudo mkdir /mnt/nix /nix
          sudo chmod 0755 /nix
          sudo mount --bind /mnt/nix /nix
      # - name: Set swap space
      #   uses: pierotofy/set-swap-space@master
      #   with:
      #     swap-size-gb: 10
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Attic cache
        uses: ritiek/attic-action@main
        with:
          endpoint: https://attic.clawsiecats.lol/
          cache: attic-action
          create: true
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: "Build: .#clawsiecats-minimal"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.clawsiecats-minimal.config.system.build.toplevel
      - name: "Build: .#clawsiecats"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.clawsiecats.config.system.build.toplevel
      - name: "Build: .#clawsiecats-luks"
