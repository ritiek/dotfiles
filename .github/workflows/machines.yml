name: machines
on:
  pull_request:
  schedule:
    - cron: "30 2 * * *"   # 08:00 IST (UTC+5:30)
  workflow_dispatch:

# NOTE: Attic can authenticate atticd through:
# $ attic login --set-default attic-action http://pilab.lion-zebra.ts.net:7080 \
# $(sudo atticd-atticadm make-token --sub ritiek --validity 1y --pull attic-action \
# --push attic-action --create-cache attic-action --destroy-cache attic-action \
# --configure-cache attic-action --configure-cache-retention attic-action)
#
# To generate authenticate push to GH actions cache token ${{ secrets.ATTIC_PUSH_TOKEN }}:
# $ sudo atticd-atticadm make-token \
#   --sub ritiek \
#   --validity 1y \
#   --pull attic-action \
#   --push attic-action \
#   --create-cache attic-action \
#   --configure-cache attic-action \
#   --configure-cache-retention attic-action

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_sha=$(gh run list --workflow machines.yml --branch main \
            --status success --limit 1 --json headSha --jq '.[0].headSha')
          current_sha=$(git rev-parse HEAD)
          echo "last success: $last_sha / current: $current_sha"
          if [ "$last_sha" = "$current_sha" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  mishy:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      # - name: Maximize build space
      #   uses: AdityaGarg8/remove-unwanted-software@v4.1
      #   with:
      #     remove-dotnet: 'true'
      #     remove-android: 'true'
      #     remove-haskell: 'true'
      #     remove-codeql: 'true'
      #     remove-docker-images: 'true'
      #
      # Filesystem on /mnt for some reason has more space on GitHub action
      # runner than /
      - name: Bind mount /nix
        run: |
          sudo mkdir /mnt/nix /nix
          sudo chmod 0755 /nix
          sudo mount --bind /mnt/nix /nix
      # - name: Set swap space
      #   uses: pierotofy/set-swap-space@master
      #   with:
      #     swap-size-gb: 10
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Attic cache
        uses: ritiek/attic-action@main
        with:
          endpoint: https://attic.clawsiecats.lol/
          cache: attic-action
          create: true
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: "Build: .#mishy"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.mishy.config.system.build.toplevel 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Notify Matrix on failure
        if: failure()
        env:
          WEBHOOK_MATRIX_AUTH: ${{ secrets.WEBHOOK_MATRIX_AUTH }}
        run: |
          set -euo pipefail
          # GitHub Actions only sends raw facts; clawsiecats builds the prompt,
          # @hermes mention, HTML formatting and the threaded log reply.
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_URL=""
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          fi
          LOG=$(tail -200 /tmp/build.log 2>/dev/null || echo "(no build log available)")
          BODY=$(jq -n \
            --arg job "machines/${{ github.job }}" \
            --arg run "$RUN_URL" \
            --arg pr "$PR_URL" \
            --arg log "$LOG" \
            '{"job":$job,"run_url":$run,"pr_url":$pr,"log":$log}')
          TXN=$(date +%s%N)
          curl -sf "https://webhook.clawsiecats.lol/matrix/github-actions/new/${TXN}" \
            -H "Authorization: Bearer $WEBHOOK_MATRIX_AUTH" \
            -H "Content-Type: application/json" \
            -d "$BODY"

  pilab:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Attic cache
        uses: ritiek/attic-action@main
        with:
          endpoint: https://attic.clawsiecats.lol/
          cache: attic-action
          create: true
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: "Build: .#pilab"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.pilab.config.system.build.toplevel

  clawsiecats:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v4.1
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
      # Filesystem on /mnt for some reason has more space on GitHub action
      # runner than /
      - name: Bind mount /nix
        run: |
          sudo mkdir /mnt/nix /nix
          sudo chmod 0755 /nix
          sudo mount --bind /mnt/nix /nix
      # - name: Set swap space
      #   uses: pierotofy/set-swap-space@master
      #   with:
      #     swap-size-gb: 10
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Attic cache
        uses: ritiek/attic-action@main
        with:
          endpoint: https://attic.clawsiecats.lol/
          cache: attic-action
          create: true
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: "Build: .#clawsiecats-minimal"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.clawsiecats-minimal.config.system.build.toplevel
      - name: "Build: .#clawsiecats"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.clawsiecats.config.system.build.toplevel
      - name: "Build: .#clawsiecats-luks"
        run: |
