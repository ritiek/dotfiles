name: machines
on:
  pull_request:
  schedule:
    - cron: "30 2 * * *"   # 08:00 IST (UTC+5:30)
  workflow_dispatch:

# NOTE: Attic can authenticate atticd through:
# $ attic login --set-default attic-action http://pilab.lion-zebra.ts.net:7080 \
# $(sudo atticd-atticadm make-token --sub ritiek --validity 1y --pull attic-action \
# --push attic-action --create-cache attic-action --destroy-cache attic-action \
# --configure-cache attic-action --configure-cache-retention attic-action)
#
# To generate authenticate push to GH actions cache token ${{ secrets.ATTIC_PUSH_TOKEN }}:
# $ sudo atticd-atticadm make-token \
#   --sub ritiek \
#   --validity 1y \
#   --pull attic-action \
#   --push attic-action \
#   --create-cache attic-action \
#   --configure-cache attic-action \
#   --configure-cache-retention attic-action

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_sha=$(gh run list --workflow machines.yml --branch main \
            --status success --limit 1 --json headSha --jq '.[0].headSha')
          current_sha=$(git rev-parse HEAD)
          echo "last success: $last_sha / current: $current_sha"
          if [ "$last_sha" = "$current_sha" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  mishy:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      # - name: Maximize build space
      #   uses: AdityaGarg8/remove-unwanted-software@v4.1
      #   with:
      #     remove-dotnet: 'true'
      #     remove-android: 'true'
      #     remove-haskell: 'true'
      #     remove-codeql: 'true'
      #     remove-docker-images: 'true'
      #
      # Filesystem on /mnt for some reason has more space on GitHub action
      # runner than /
      - name: Bind mount /nix
        run: |
          sudo mkdir /mnt/nix /nix
          sudo chmod 0755 /nix
          sudo mount --bind /mnt/nix /nix
      # - name: Set swap space
      #   uses: pierotofy/set-swap-space@master
      #   with:
      #     swap-size-gb: 10
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Attic cache
        uses: ritiek/attic-action@main
        with:
          endpoint: https://attic.clawsiecats.lol/
          cache: attic-action
          create: true
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: "Build: .#mishy"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.mishy.config.system.build.toplevel

  pilab:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup Attic cache
        uses: ritiek/attic-action@main
        with:
          endpoint: https://attic.clawsiecats.lol/
          cache: attic-action
          create: true
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: "Build: .#pilab"
        run: |
          timeout -k 300 17400 nix build --fallback --keep-going .#nixosConfigurations.pilab.config.system.build.toplevel

