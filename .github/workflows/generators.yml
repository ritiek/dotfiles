name: generators
on:
  pull_request:
  schedule:
    - cron: "30 2 * * *"   # 08:00 IST (UTC+5:30)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_sha=$(gh run list --workflow generators.yml --branch main \
            --status success --limit 1 --json headSha --jq '.[0].headSha')
          current_sha=$(git rev-parse HEAD)
          echo "last success: $last_sha / current: $current_sha"
          if [ "$last_sha" = "$current_sha" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  minimal:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: "Build: .#minimal-iso"
        run: |
          timeout -k 300 17400 nix build .#minimal-iso
      # - name: Upload .#minimal-iso
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: minimal.iso
      #     path: ./result/iso/nixos.iso
      - name: "Build: .#minimal-install-iso"
        run: |
          timeout -k 300 17400 nix build .#minimal-install-iso
